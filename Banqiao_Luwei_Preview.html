<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>板橋湳雅・府中滷味挑選卡｜Google Maps 導向版</title>
  <meta name="description" content="板橋湳雅夜市與府中周邊滷味推薦清單，無圖片版，點選即可導向 Google Maps 查詢或導航。" />
  <style>
    :root {
      --bg: #140f0c;
      --panel: rgba(255,255,255,.08);
      --panel2: rgba(255,255,255,.13);
      --text: #fff8ef;
      --muted: rgba(255,248,239,.72);
      --soft: rgba(255,248,239,.5);
      --line: rgba(255,255,255,.15);
      --gold: #ffc857;
      --red: #ff6b4a;
      --orange: #ff9f1c;
      --green: #7bd88f;
      --radius: 24px;
      --max: 1100px;
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 8%, rgba(255,107,74,.22), transparent 30%),
        radial-gradient(circle at 85% 12%, rgba(255,200,87,.18), transparent 28%),
        linear-gradient(135deg, #140f0c 0%, #26150f 45%, #100c0a 100%);
      color: var(--text);
    }
    a { color: inherit; text-decoration: none; }
    .wrap { width: min(var(--max), calc(100% - 32px)); margin: 0 auto; }
    header { padding: 42px 0 24px; }
    .hero {
      display: grid;
      grid-template-columns: 1.3fr .7fr;
      gap: 20px;
      align-items: stretch;
    }
    .hero-main, .hero-side, .toolbar, .note, .card {
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel2), var(--panel));
      box-shadow: 0 24px 70px rgba(0,0,0,.28);
      backdrop-filter: blur(16px);
      border-radius: var(--radius);
    }
    .hero-main { padding: 28px; }
    .eyebrow { color: var(--gold); font-weight: 800; letter-spacing: .08em; font-size: 13px; margin-bottom: 10px; }
    h1 { font-size: clamp(30px, 5vw, 54px); line-height: 1.05; margin: 0 0 14px; }
    .hero-main p { color: var(--muted); margin: 0; line-height: 1.8; font-size: 16px; }
    .hero-side { padding: 22px; display: grid; gap: 12px; align-content: center; }
    .stat { padding: 16px; border: 1px solid var(--line); border-radius: 18px; background: rgba(0,0,0,.16); }
    .stat b { display: block; font-size: 26px; color: var(--gold); }
    .stat span { color: var(--muted); font-size: 13px; }
    .toolbar { margin: 18px 0; padding: 16px; display: grid; grid-template-columns: 1fr 210px auto; gap: 12px; }
    input, select, button {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px 14px;
      color: var(--text);
      background: rgba(0,0,0,.24);
      outline: none;
      font: inherit;
    }
    select option { color: #1b120e; }
    button { cursor: pointer; background: rgba(255,200,87,.16); font-weight: 800; }
    .note { padding: 16px 18px; color: var(--muted); line-height: 1.7; font-size: 14px; margin-bottom: 20px; }
    .cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; padding-bottom: 44px; }
    .card {
      overflow: hidden;
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      position: relative;
    }
    .card:hover { transform: translateY(-4px); border-color: rgba(255,200,87,.5); background: linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.08)); }
    .card-link-layer { position: absolute; inset: 0; z-index: 1; }
    .card-inner { padding: 22px; position: relative; z-index: 2; pointer-events: none; }
    .card-inner .actions, .card-inner .address-row, .card-inner .copy-btn { pointer-events: auto; }
    .topline { display: flex; justify-content: space-between; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
    .rank {
      flex: 0 0 auto;
      width: 48px; height: 48px;
      display: grid; place-items: center;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--red), var(--orange));
      box-shadow: 0 10px 30px rgba(255,107,74,.26);
      font-weight: 900;
      font-size: 22px;
    }
    .pill { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,.1); border: 1px solid var(--line); color: var(--muted); font-size: 13px; }
    h2 { margin: 0 0 10px; font-size: 24px; line-height: 1.25; }
    .desc { color: var(--muted); line-height: 1.75; margin: 0 0 14px; }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
    .stars { color: var(--gold); letter-spacing: 1px; font-weight: 900; }
    .score { color: var(--muted); margin-left: 6px; font-size: 14px; }
    .address-row { display: flex; gap: 10px; align-items: center; padding: 12px; border-radius: 16px; background: rgba(0,0,0,.18); border: 1px solid var(--line); margin-bottom: 14px; }
    .address { flex: 1; color: var(--text); font-size: 14px; line-height: 1.5; }
    .copy-btn { flex: 0 0 auto; width: auto; padding: 10px 12px; font-size: 13px; }
    .actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn {
      display: inline-flex; justify-content: center; align-items: center;
      min-height: 42px;
      padding: 10px 12px;
      border-radius: 15px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,.1);
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
    }
    .btn.primary { background: linear-gradient(135deg, var(--red), var(--orange)); border-color: transparent; }
    .btn.green { background: rgba(123,216,143,.16); }
    .toast { position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(20px); opacity: 0; background: rgba(0,0,0,.78); color: white; padding: 12px 16px; border-radius: 999px; transition: .2s ease; z-index: 50; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 820px) {
      .hero { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
      .cards { grid-template-columns: 1fr; }
      .actions { grid-template-columns: 1fr; }
      .card-inner { padding: 18px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap hero">
      <section class="hero-main">
        <div class="eyebrow">🍢 板橋湳雅・府中滷味清單｜Google Maps 導向版</div>
        <h1>點店家直接查地圖</h1>
        <p>每張卡片都可以直接開啟 Google Maps 查詢。</p>
      </section>
      <aside class="hero-side">
        <div class="stat"><b>5</b><span>推薦店家</span></div>
        <div class="stat"><b>Maps</b><span>直接查詢與導航</span></div>
        <div class="stat"><b>0</b><span>圖片依賴</span></div>
      </aside>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="搜尋店名、地址、口味，例如：麻辣、東山鴨頭、南雅東路" />
      <select id="typeFilter">
        <option value="all">全部類型</option>
        <option value="爆炒滷味">爆炒滷味</option>
        <option value="加熱滷味">加熱滷味</option>
        <option value="乾式滷味">乾式滷味</option>
        <option value="麻辣滷味">麻辣滷味</option>
      </select>
      <button id="resetBtn" type="button">重設</button>
    </section>

    <section class="note">
      操作方式：點選卡片空白處會開啟 Google Maps 店家查詢；也可以使用卡片下方的「開地圖」、「導航」、「看評論」按鈕。
      星數為推薦參考值，不等同即時 Google 評分。
    </section>

    <section id="cards" class="cards" aria-live="polite"></section>
  </main>

  <div id="toast" class="toast">已複製地址</div>

  <script>
    const stores = [
      {
        rank: 1,
        name: "賣什麼吃什麼 爆炒滷味",
        type: "爆炒滷味",
        area: "湳雅夜市",
        address: "新北市板橋區南雅東路45號",
        desc: "夜市內最有特色的創意滷味之一，將滷好的食材加入辛香料，下鍋大火快炒，適合想吃鍋氣與重香氣的人。",
        taste: "鍋氣、辛香料、創意感",
        recommendScore: 4.7,
        query: "賣什麼吃什麼 爆炒滷味 新北市板橋區南雅東路45號"
      },
      {
        rank: 2,
        name: "八八 平價加熱滷味",
        type: "加熱滷味",
        area: "板橋南雅西路",
        address: "新北市板橋區南雅西路二段94號",
        desc: "地方評價高的平價加熱滷味，湯頭偏清爽不油膩，食材新鮮度與選擇都很多樣，適合日常宵夜。",
        taste: "清爽湯頭、平價、多選擇",
        recommendScore: 4.5,
        query: "八八 平價加熱滷味 新北市板橋區南雅西路二段94號"
      },
      {
        rank: 3,
        name: "金記百年東山鴨頭 湳雅店",
        type: "乾式滷味",
        area: "湳雅夜市",
        address: "新北市板橋區南雅東路140號",
        desc: "乾式滷味代表，食材滷得透徹後再快速過油，口感偏香、甜、酥，適合邊走邊吃或買回家配飲料。",
        taste: "先滷後炸、乾式、涮嘴",
        recommendScore: 4.6,
        query: "金記百年東山鴨頭 湳雅店 新北市板橋區南雅東路140號"
      },
      {
        rank: 4,
        name: "滷小小",
        type: "加熱滷味",
        area: "南雅南路巷內",
        address: "新北市板橋區南雅南路一段5巷14號",
        desc: "主打加熱滷味，滷汁中藥香氣明顯，辣醬也是亮點，適合想吃湯滷香氣與微辣層次的人。",
        taste: "中藥香、辣醬、湯滷",
        recommendScore: 4.6,
        query: "滷小小 新北市板橋區南雅南路一段5巷14號"
      },
      {
        rank: 5,
        name: "鴨掌門麻辣滷味 府中店",
        type: "麻辣滷味",
        area: "府中站附近",
        address: "新北市板橋區館前西路95號",
        desc: "位於府中站附近，靠近夜市邊緣，主打麻辣滷味，辣度與香氣十足，適合喜歡重口味的人。",
        taste: "麻辣、香氣、冷滷系",
        recommendScore: 4.7,
        query: "鴨掌門麻辣滷味 府中店 新北市板橋區館前西路95號"
      }
    ];

    const cardsEl = document.getElementById("cards");
    const searchInput = document.getElementById("searchInput");
    const typeFilter = document.getElementById("typeFilter");
    const resetBtn = document.getElementById("resetBtn");
    const toast = document.getElementById("toast");

    function escapeHTML(str) {
      return String(str).replace(/[&<>'"]/g, tag => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", "'": "&#39;", '"': "&quot;"
      }[tag]));
    }

    function mapsSearchUrl(query) {
      return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(query)}`;
    }

    function mapsDirectionUrl(query) {
      return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(query)}`;
    }

    function mapsReviewUrl(store) {
      return mapsSearchUrl(`${store.name} 評論 ${store.address}`);
    }

    function stars(score) {
      const full = Math.floor(score);
      const half = score - full >= 0.5;
      return "★".repeat(full) + (half ? "☆" : "") + "☆".repeat(Math.max(0, 5 - full - (half ? 1 : 0)));
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const type = typeFilter.value;
      const filtered = stores.filter(store => {
        const haystack = `${store.name} ${store.type} ${store.area} ${store.address} ${store.desc} ${store.taste}`.toLowerCase();
        return (type === "all" || store.type === type) && (!q || haystack.includes(q));
      });

      cardsEl.innerHTML = filtered.map(store => {
        const mapUrl = mapsSearchUrl(store.query);
        const navUrl = mapsDirectionUrl(store.query);
        const reviewUrl = mapsReviewUrl(store);
        return `
          <article class="card">
            <a class="card-link-layer" href="${mapUrl}" target="_blank" rel="noopener" aria-label="在 Google Maps 開啟 ${escapeHTML(store.name)}"></a>
            <div class="card-inner">
              <div class="topline">
                <div>
                  <span class="pill">${escapeHTML(store.area)} · ${escapeHTML(store.type)}</span>
                  <h2>${escapeHTML(store.name)}</h2>
                </div>
                <div class="rank">${store.rank}</div>
              </div>
              <p class="desc">${escapeHTML(store.desc)}</p>
              <div class="meta">
                <span class="pill">口味：${escapeHTML(store.taste)}</span>
                <span class="pill"><span class="stars">${stars(store.recommendScore)}</span><span class="score">推薦 ${store.recommendScore.toFixed(1)}</span></span>
              </div>
              <div class="address-row">
                <div class="address">📍 ${escapeHTML(store.address)}</div>
                <button class="copy-btn" type="button" onclick="copyAddress('${escapeHTML(store.address)}')">複製</button>
              </div>
              <div class="actions">
                <a class="btn primary" href="${mapUrl}" target="_blank" rel="noopener">開地圖</a>
                <a class="btn green" href="${navUrl}" target="_blank" rel="noopener">導航</a>
                <a class="btn" href="${reviewUrl}" target="_blank" rel="noopener">看評論</a>
              </div>
            </div>
          </article>
        `;
      }).join("");

      if (!filtered.length) {
        cardsEl.innerHTML = `<div class="note" style="grid-column: 1/-1;">找不到符合條件的店家，可以換個關鍵字試試。</div>`;
      }
    }

    async function copyAddress(address) {
      try {
        await navigator.clipboard.writeText(address);
        showToast("已複製地址");
      } catch {
        showToast("複製失敗，請手動選取地址");
      }
    }

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 1500);
    }

    searchInput.addEventListener("input", render);
    typeFilter.addEventListener("change", render);
    resetBtn.addEventListener("click", () => {
      searchInput.value = "";
      typeFilter.value = "all";
      render();
    });

    render();
  </script>
</body>
</html>
